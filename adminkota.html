<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kota Doria | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="blob-bg"></div>
    <div class="blob-bg blob-2"></div>

    <nav class="glass-nav">
        <div class="nav-container">
            <h1 class="logo">Kota Doria <span
                    style="font-size: 1rem; color: var(--text-secondary); font-weight: 400;">Admin</span></h1>
            <ul class="nav-links">
                <li><a href="orders.html" style="color:#fbbf24;font-weight:600;">📋 Orders</a></li>
                <li><a href="aiphoto.html" style="color:#a8b8ff;font-weight:600;">✨ AI Studio</a></li>
                <li><a href="index.html">View Catalog</a></li>
                <li><a href="#" id="logout-btn">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="catalog-section" style="padding-top: 4rem;">

        <!-- Upload Product Form -->
        <div
            style="max-width: 600px; margin: 0 auto 3rem; background: var(--glass-bg); padding: 2.5rem; border-radius: 20px; border: 1px solid var(--glass-border); backdrop-filter: blur(16px);">
            <h2 style="margin-bottom: 2rem; font-size: 2rem;">Add New Product</h2>

            <form id="upload-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div id="status-message" style="display: none; padding: 1rem; border-radius: 8px; font-weight: 500;">
                </div>

                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="title" style="color: var(--text-secondary); font-size: 0.9rem;">Product Title</label>
                    <input type="text" id="title" name="title" required
                        style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.8rem 1rem; border-radius: 8px; color: white; font-family: inherit;">
                </div>

                <div style="display: flex; gap: 1rem;">
                    <div style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                        <label for="price" style="color: var(--text-secondary); font-size: 0.9rem;">Price (₹ per
                            piece)</label>
                        <input type="number" id="price" name="price" required min="0" step="0.01"
                            style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.8rem 1rem; border-radius: 8px; color: white; font-family: inherit;">
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                        <label for="category" style="color: var(--text-secondary); font-size: 0.9rem;">Category</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <select id="category" name="category" required
                                style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.8rem 1rem; border-radius: 8px; color: white; font-family: inherit; flex-grow: 1;">
                                <!-- Dynamic categories -->
                            </select>
                            <button type="button" id="add-cat-ui-btn" style="
                                background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
                                border-radius: 8px; cursor: pointer; padding: 0 0.75rem;
                                font-size: 1.2rem; color: white; font-family: inherit;">
                                +
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Hidden Add Category Panel -->
                <div id="new-cat-panel"
                    style="display: none; margin-bottom: 0.5rem; padding: 1rem; background: rgba(0,0,0,0.1); border: 1px solid var(--glass-border); border-radius: 8px;">
                    <label
                        style="font-size: 0.8rem; margin-bottom: 0.5rem; display: block; color: var(--text-secondary);">New
                        Category Name</label>
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="text" id="new-cat-name" placeholder="Handloom"
                            style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.8rem 1rem; border-radius: 8px; color: white; font-family: inherit; flex-grow: 1;">
                        <button type="button" id="submit-new-cat"
                            style="background: var(--accent); color: white; border: none; padding: 0 1rem; border-radius: 8px; font-family: inherit; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.3s;"
                            onmouseover="this.style.background='var(--accent-hover)'"
                            onmouseout="this.style.background='var(--accent)'">Add</button>
                    </div>
                </div>

                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="description"
                        style="color: var(--text-secondary); font-size: 0.9rem;">Description</label>
                    <textarea id="description" name="description" rows="4" required
                        style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.8rem 1rem; border-radius: 8px; color: white; font-family: inherit; resize: vertical;"></textarea>
                </div>

                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="images" style="color: var(--text-secondary); font-size: 0.9rem;">Product Images (select
                        multiple)</label>
                    <input type="file" id="images" name="images" accept="image/*" multiple required
                        style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.8rem 1rem; border-radius: 8px; color: white; font-family: inherit;">
                </div>

                <button type="submit"
                    style="background: var(--accent); color: white; border: none; padding: 1rem; border-radius: 8px; font-family: inherit; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 1rem; transition: background 0.3s;"
                    onmouseover="this.style.background='var(--accent-hover)'"
                    onmouseout="this.style.background='var(--accent)'">
                    Upload to Catalog
                </button>
            </form>
        </div>

        <!-- Manage Products (Delete) -->
        <div
            style="max-width: 900px; margin: 0 auto; background: var(--glass-bg); padding: 2.5rem; border-radius: 20px; border: 1px solid var(--glass-border); backdrop-filter: blur(16px);">
            <h2 style="margin-bottom: 2rem; font-size: 1.8rem;">Manage Products</h2>
            <div id="admin-product-grid" class="product-grid"
                style="grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));">
                <p id="admin-loading" style="color: var(--text-secondary); grid-column: 1/-1;">Loading products...</p>
            </div>
        </div>

    </main>

    <!-- Edit Product Modal -->
        <div id="edit-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; padding: 1rem;">
            <div style="background: var(--glass-bg); padding: 2.5rem; border-radius: 20px; border: 1px solid var(--glass-border); width: 100%; max-width: 620px; max-height: 92vh; overflow-y: auto; color: var(--text-primary);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2 style="font-size: 1.8rem; margin: 0; color: white;">✏️ Edit Product</h2>
                    <button id="close-edit-modal" style="background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); color: white; font-size: 1.4rem; cursor: pointer; line-height: 1; width: 36px; height: 36px; border-radius: 50%; display: grid; place-items: center; transition: background 0.2s;" onmouseover="this.style.background='rgba(239,68,68,0.25)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">&times;</button>
                </div>

                <form id="edit-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <input type="hidden" id="edit-id">

                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label for="edit-title" style="color: var(--text-secondary); font-size: 0.9rem;">Product Title</label>
                        <input type="text" id="edit-title" name="title" required style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.8rem 1rem; border-radius: 8px; color: white; font-family: inherit;">
                    </div>

                    <div style="display: flex; gap: 1rem;">
                        <div style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                            <label for="edit-price" style="color: var(--text-secondary); font-size: 0.9rem;">Price (₹ per piece)</label>
                            <input type="number" id="edit-price" name="price" required min="0" step="0.01" style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.8rem 1rem; border-radius: 8px; color: white; font-family: inherit;">
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                            <label for="edit-category" style="color: var(--text-secondary); font-size: 0.9rem;">Category</label>
                            <select id="edit-category" name="category" required style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.8rem 1rem; border-radius: 8px; color: white; font-family: inherit; width: 100%;">
                                <!-- Categories populated by JS -->
                            </select>
                        </div>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label for="edit-description" style="color: var(--text-secondary); font-size: 0.9rem;">Description</label>
                        <textarea id="edit-description" name="description" rows="4" required style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.8rem 1rem; border-radius: 8px; color: white; font-family: inherit; resize: vertical;"></textarea>
                    </div>

                    <!-- ── Photo Management ── -->
                    <div style="background: rgba(102,126,234,0.06); border: 1px solid rgba(102,126,234,0.28); border-radius: 14px; padding: 1.4rem; display: flex; flex-direction: column; gap: 1.1rem;">
                        <div style="display: flex; align-items: center; justify-content: space-between;">
                            <span style="color: #a8b8ff; font-weight: 700; font-size: 1rem;">📸 Product Photos</span>
                            <span id="edit-photo-count" style="font-size: 0.78rem; background: rgba(102,126,234,0.15); border: 1px solid rgba(102,126,234,0.3); color: #c7d2fe; padding: 0.2rem 0.65rem; border-radius: 20px;"></span>
                        </div>
                        <!-- Current photo thumbnails (JS renders here) -->
                        <div id="edit-photos-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 0.8rem;"></div>
                        <!-- Add new photos -->
                        <div style="border-top: 1px solid rgba(255,255,255,0.08); padding-top: 1.1rem; display: flex; flex-direction: column; gap: 0.5rem;">
                            <label for="edit-new-images" style="color: var(--text-secondary); font-size: 0.85rem; font-weight: 600;">➕ Add More Photos</label>
                            <input type="file" id="edit-new-images" accept="image/*" multiple style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.7rem 1rem; border-radius: 8px; color: white; font-family: inherit;">
                        </div>
                    </div>

                    <button type="submit" id="save-edit-btn" style="background: var(--accent); color: white; border: none; padding: 1rem; border-radius: 8px; font-family: inherit; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: background 0.3s;" onmouseover="this.style.background='var(--accent-hover)'" onmouseout="this.style.background='var(--accent)'">
                        💾 Save Changes
                    </button>
                </form>
            </div>
        </div>

    <script src="admin.js"></script>
</body>

</html>
